<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" /> 
    <title>Switch test</title>
    <style>
      * {
        box-sizing: border-box;
      }
      @keyframes carRun {
        0% {
          top: 5px;
        }
        50% {
          top: 0;
        }
        100% {
          top: 5px;
        }
      }
      @keyframes roadRun {
        0% {
          top: -80px;
        }
        100% {
          top: -127px;
        }
      }
      @keyframes wallRun {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: -250px 0;
        }
      }
      @keyframes pokemonRun {
        0% {
          transform: translateZ(-4895px);
        }
        100% {
          transform: translateZ(1000px);
        }
      }
      body {
        background-color: #dddddd;
      }
      label {
        display: none;
        position: absolute;
        left: 500px;
        top: 200px;
        width: 200px;
        height: 200px;
        perspective: 600px;
        z-index: -1;
      }
      span {
        color: #ffffff;
      }
      input {
        margin-top: 200px;
      }
      input:checked + label {
        display: block;
      }
      .side {
        width: 400px;
        height: 100px;
        position: absolute;
        left: 0;
        top: 0;
        background-image: url("./images/van_side.png");
        background-size: cover;
        animation-name: carRun;
        animation-duration: 500ms;
        animation-iteration-count: infinite;
      }
      .back {
        width: 200px;
        height: 100px;
        background-image: url("./images/van.png");
        background-size: cover;
        position: absolute;
        left: 0;
        top: 0;
        animation-name: carRun;
        animation-duration: 500ms;
        animation-iteration-count: infinite;
      }
      .bgMountain {
        width: 1000px;
        height: 500px;
        background: url("./images/mountain.jpg") 0 0 no-repeat;
        opacity: 0.3;
        background-size: cover;
        position: absolute;
        left: -450px;
        top: -100px;
        transform: translateZ(-4895px);
      }
      .pokemon {
        width: 100px;
        height: 100px;
        background: url("./images/pokemon.png") 0 0 no-repeat;
        background-size: cover;
        position: absolute;
        left: -220px;
        top: 0;
        animation-name: pokemonRun;
        animation-duration: 2500ms;
        animation-iteration-count: infinite;
      }
      .dino {
        width: 100px;
        height: 100px;
        background: url("./images/pokemon_02.png") 0 0 no-repeat;
        background-size: cover;
        position: absolute;
        left: 350px;
        top: 0px;
        animation-name: pokemonRun;
        animation-duration: 2500ms;
        animation-iteration-count: infinite;
      }
      .ball {
        width: 100px;
        height: 100px;
        background: url("./images/pokemon_03.png") 0 0 no-repeat;
        background-size: cover;
        position: absolute;
        left: 350px;
        top: 0px;
        animation-name: pokemonRun;
        animation-duration: 2500ms;
        animation-iteration-count: infinite;
      }
      .road {
        width: 960px;
        height: 10000px;
        position: absolute;
        overflow: hidden;
        background: #080808;
        background: linear-gradient(
          180deg,
          rgba(8, 8, 8, 1) 0%,
          rgba(125, 125, 125, 1) 68%,
          rgba(186, 186, 186, 1) 100%
        );
        transform: rotateX(-90deg) translateX(-420px) translateY(0px)
          translateZ(-4895px);
        border-left: #999999 solid 20px;
        border-right: #999999 solid 20px;
      }
      .ceiling {
        width: 1000px;
        height: 10000px;
        position: absolute;
        overflow: hidden;
        background: #080808;
        background: linear-gradient(
          180deg,
          rgba(87, 8, 86, 1) 0%,
          rgba(12, 125, 144, 1) 68%,
          rgba(186, 186, 186, 1) 100%
        );
        transform: rotateX(-90deg) translateX(-420px) translateY(0px)
          translateZ(-5000px);
      }
      .rightWall {
        width: 10000px;
        height: 105px;
        position: absolute;
        transition: none;
        background: repeating-linear-gradient(
            45deg,
            rgba(0, 0, 0, 0.2),
            rgba(0, 0, 0, 0.2) 50px,
            rgba(0, 0, 0, 0.3) 50px,
            rgba(0, 0, 0, 0.3) 100px
          ),
          #f5c242;
        animation-name: wallRun;
        animation-duration: 500ms;
        animation-iteration-count: infinite;

        transform: rotateY(-90deg) translateX(-0px) translateY(0)
          translateZ(4460px) scaleX(-1);
      }
      .leftWall {
        width: 10000px;
        height: 105px;
        position: absolute;
        transition: none;
        background: repeating-linear-gradient(
            45deg,
            rgba(0, 0, 0, 0.2),
            rgba(0, 0, 0, 0.2) 50px,
            rgba(0, 0, 0, 0.3) 50px,
            rgba(0, 0, 0, 0.3) 100px
          ),
          #f5c242;
        animation-name: wallRun;
        animation-duration: 500ms;
        animation-iteration-count: infinite;
        transform: rotateY(-90deg) translateX(-0px) translateY(0)
          translateZ(5420px) scaleX(-1);
      }
      .road hr {
        height: 10000px;
        width: 1px;
        border-top: 0;
        border-bottom: 0;
        border-right: #ffffff70 dashed 20px;
        border-left: 0;
        position: absolute;
        top: -80px;
        left: 489px;
        animation-name: roadRun;
        animation-duration: 100ms;
        animation-iteration-count: infinite;
      }
      .back {
        transform: rotateY(0deg) translateZ(200px);
      }
      .side.right {
        transform: rotateY(90deg) translateZ(0px) scaleX(-1);
      }
      .side.left {
        transform: rotateY(-90deg) translateZ(200px);
      }
      .inner {
        transition: all 2s ease-in;
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transform: rotateX(-7deg) translateZ(-400px);
      }
      .mainImage.right .inner {
        transform: rotateX(-7deg) rotateY(-30deg) translateZ(-400px);
      }
      .mainImage.left .inner {
        transform: rotateX(-7deg) rotateY(30deg) translateZ(-400px);
      }
    </style>
  </head>
  <body>
    <div class="mount"></div>
    <span
      ><<<input type="radio" id="left" name="mainInput" />
      <label class="mainImage left" for="left"
        ><div class="inner">
          <div class="bgMountain"></div>
          <div class="side left"></div>
          <div class="back"></div>
          <div class="side right"></div>
          <div class="pokemon"></div>
          <div class="road"><hr /></div>
          <div class="leftWall"></div>
          <div class="rightWall"></div>
          <div class="ceiling"></div></div></label
    ></span>
    <input type="radio" id="straight" name="mainInput" checked />
    <label class="mainImage straight" for="straight"
      ><div class="inner">
        <div class="ball"></div>
        <div class="side left"></div>
        <div class="back"></div>
        <div class="side right"></div>
        <div class="road"><hr /></div>
        <div class="leftWall"></div>
        <div class="rightWall"></div>
        <div class="ceiling"></div></div
    ></label>
    <span
      ><input type="radio" id="right" name="mainInput" />
      <label class="mainImage right" for="right"
        ><div class="inner">
          <div class="bgMountain"></div>
          <div class="dino"></div>
          <div class="side left"></div>
          <div class="back"></div>
          <div class="side right"></div>
          <div class="road"><hr /></div>
          <div class="leftWall"></div>
          <div class="rightWall"></div>
          <div class="ceiling"></div></div></label
      >>></span
    >
  </body>
</html>
